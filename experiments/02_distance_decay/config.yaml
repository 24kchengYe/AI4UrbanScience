# Experiment 02: Distance Decay (meso-scale)

experiment: distance_decay

primary_model: gpt-4o

all_models:
  - gpt-4o
  - claude-3.5-sonnet
  - deepseek-v3
  - gemini-2.0-flash
  - chatglm-4

primary_prompt: distance_decay.baseline_100

prompt_variants:
  - distance_decay.baseline_100
  - distance_decay.baseline_100_detailed_instructions
