# Experiment 06: Distribution divergence (Fig. 4)

experiment: distribution_divergence

# Model whose generated data we compare against the real-world baseline.
primary_model: gpt-4o

# Prompt variants to test for the three R/G/GC/GA scenarios from Fig. 4.
scenarios:
  G:
    prompt: scaling_law.baseline
    label: baseline ('in a country')
  GC:
    prompt: scaling_law.china
    label: China anchor ('in china')
  GA:
    prompt: scaling_law.usa
    label: USA anchor ('in the USA')

# Columns shared across real + generated data.
columns:
  - Population
  - GDP
  - Infrastructure

# Number of equal-width bins used for MAE / Overlap Ratio.
n_bins: 30
